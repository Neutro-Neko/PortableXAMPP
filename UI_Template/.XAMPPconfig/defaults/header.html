<!-- Custom Glassmorphic Modal for Non-Displayable Files -->
<div id="custom-modal" class="modal-overlay">
    <div>
        <div class="icon">⚠️</div>
        <h3>Cannot Display File</h3>
        <p>This file type cannot be displayed natively in the browser.</p>
        <button id="modal-close">Dismiss</button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Dynamically load override.css only if it exists
        const cssUrl = '/.XAMPPconfig/overrides/override.css';
        fetch(cssUrl, { method: 'HEAD' }).then(res => {
            if (res.ok) {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = cssUrl;
                document.head.appendChild(link);
            }
        });




        // Modal Control Elements
        const modal = document.getElementById('custom-modal');
        const closeBtn = document.getElementById('modal-close');
        
        closeBtn.addEventListener('click', () => { modal.style.display = 'none'; });
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });

        // Cache synchronous checks to ensure we only make ONE network request per icon type
        const iconCache = {};
        function getResolvedIconUrl(iconName) {
            if (iconCache[iconName] === undefined) {
                const overrideUrl = `/.XAMPPconfig/overrides/icons/files/${iconName}`;
                const defaultUrl = `/.XAMPPconfig/defaults/icons/files/${iconName}`;
                const documentUrl = `/.XAMPPconfig/defaults/icons/files/document.svg`;

                // Check override
                let req = new XMLHttpRequest();
                req.open('HEAD', overrideUrl, false); // false makes it synchronous
                try { req.send(null); } catch(e) {}
                if (req.status === 200) {
                    iconCache[iconName] = overrideUrl;
                    return iconCache[iconName];
                }

                // Check standard
                req = new XMLHttpRequest();
                req.open('HEAD', defaultUrl, false);
                try { req.send(null); } catch(e) {}
                if (req.status === 200) {
                    iconCache[iconName] = defaultUrl;
                    return iconCache[iconName];
                }

                // Fallback
                iconCache[iconName] = documentUrl;
            }
            return iconCache[iconName];
        }

        // 2. Loop through file links to apply icons and intercept downloads
        document.querySelectorAll('li a').forEach(link => {
            const href = link.getAttribute('href');
            if (!href) return;

            const hrefLower = href.toLowerCase();

            // Special case: phpMyAdmin symlink style override
            if (hrefLower.includes('phpmyadmin')) {
                link.style.setProperty('--dynamic-icon', "url('/.XAMPPconfig/defaults/icons/files/phpmyadmin.ico')");
                link.classList.add('dict-icon');
                link.textContent = 'phpMyAdmin';
                return;
            }

            // Gray out hidden files (files starting with a dot, but ignoring the parent directory link)
            const fileName = link.textContent.trim();
            if (fileName.startsWith('.') && hrefLower !== '../') {
                link.style.opacity = '0.4';
            }

            // Skip directories and parent links
            if (hrefLower.endsWith('/') || hrefLower.includes('../') || hrefLower === '/' || hrefLower.startsWith('?')) return;

            // Apply icons dynamically based strictly on the file extension
            let iconExt = hrefLower.split('.').pop();
            // Handle files without extensions gracefully
            if (!hrefLower.includes('.') || iconExt === hrefLower) {
                iconExt = 'file';
            }
            
            const iconName = `${iconExt}.svg`;
            const resolvedUrl = getResolvedIconUrl(iconName);
            link.style.setProperty('--dynamic-icon', `url('${resolvedUrl}')`);
            link.classList.add('dict-icon');

            // Intercept clicks on non-viewable extensions
            const viewableExtensions = [
                'html', 'htm', 'php', 'txt', 'pdf', 'jpg', 'jpeg', 'png', 'gif', 'svg', 'webp', 'heic', 'heif', 'css', 'js', 'json', 'xml', 'md', 'csv'
            ];
            const ext = hrefLower.split('.').pop();
            if (!viewableExtensions.includes(ext)) {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    modal.style.display = 'flex';
                });
            }
        });
    });
</script>
